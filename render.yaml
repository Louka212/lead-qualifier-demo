services:
  - type: web
    name: lead-qualifier
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY      # optional — without it the widget runs in scripted mode
        sync: false
      - key: BOOKING_URL            # optional — your Calendly / booking link for hot leads
        sync: false
      - key: SLACK_WEBHOOK_URL      # optional — get pinged in Slack when a lead is captured
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3
